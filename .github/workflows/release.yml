name: Release

# Tag-triggered publish (v* tags): crates.io (token) + PyPI (trusted publishing).
# The tag should match the Cargo.toml version (vX.Y.Z). No PyPI secret — PyPI
# upload uses OIDC trusted publishing (configure a pending publisher on PyPI:
# project `petektools`, owner kkollsga, repo petektools, workflow release.yml,
# environment pypi). crates.io still uses the CARGO_REGISTRY_TOKEN repo secret.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # CI gate: nothing builds or publishes unless the full local gate passes on
  # the runner too. A red gate blocks the release — by design.
  gates:
    name: gates (fmt · clippy · test · py smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: python smoke (wheel build + pytest on the 3.10 floor)
        run: |
          pip install maturin pytest numpy
          maturin build --release --out dist
          pip install --find-links dist --no-index petektools
          pytest python/tests/ -q

  publish-crate:
    name: crates.io
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io (skip if this version is already published)
        run: |
          VER=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="petektools") | .version')
          if curl -fsS -H "User-Agent: petektools-ci" \
               "https://crates.io/api/v1/crates/petektools/$VER" \
               | jq -e '.version.num' >/dev/null 2>&1; then
            echo "petektools $VER already on crates.io — skipping publish"
          else
            cargo publish -p petektools --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi

  sdist:
    name: build sdist
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  wheels:
    name: build wheels ${{ matrix.runner }} ${{ matrix.target }}
    needs: gates
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, target: x86_64 }
          - { runner: ubuntu-latest, target: aarch64 }
          # One macOS job: a universal2 wheel (x86_64 + arm64) on the Apple-Silicon
          # runner — no separate Intel runner needed.
          - { runner: macos-14, target: universal2-apple-darwin }
          - { runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.target }}
          path: dist

  publish-pypi:
    name: PyPI (trusted publishing)
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
