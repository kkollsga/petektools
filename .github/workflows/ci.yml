name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: build · fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - name: fmt
        run: cargo fmt --all -- --check
      # `--workspace` also lints/builds the `py/` PyO3 cdylib (extension-module
      # links fine on Linux); the wheel job below builds + imports it for real.
      - name: clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features --verbose

  wheel-build:
    # abi3-py310 produces one wheel for every supported CPython. Build that
    # artifact once; the matrix below proves the same bits on every runtime.
    name: build abi3 wheel once
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: install maturin
        run: pip install maturin
      - name: build release wheel
        run: maturin build --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: ci-abi3-wheel
          path: dist/*.whl

  wheel-test:
    name: install same abi3 wheel + test (py ${{ matrix.python-version }})
    needs: wheel-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: actions/download-artifact@v8
        with:
          name: ci-abi3-wheel
          path: dist
      - name: install pytest + numpy
        run: pip install pytest numpy
      - name: install wheel + run smoke/parity suite
        run: |
          pip install dist/*.whl
          pytest python/tests/ -q
