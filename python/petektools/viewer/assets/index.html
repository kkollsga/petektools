<!doctype html>
<!--
  petek viewer — a bundle-driven, domain-agnostic inspection SPA. Tabs render
  whatever typed layers / columns / mesh / marks the JSON declares (names, units
  and value ranges included); the JS carries no domain knowledge. Zero external
  fetches: three.js is vendored as a classic global; nothing loads off the network.
  Colour: perceptually-uniform (viridis) for continuous fields; a fixed
  categorical order, assigned by entity, for identity (wells / horizons / zones).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>petek — model viewer</title>
<style>
  /* --- design tokens (dataviz reference palette; light + dark, SELECTED) --- */
  .viz-root {
    --surface-1: #fcfcfb;      --plane: #f9f9f7;
    --row-h: 28px;
    --text-primary: #0b0b0b;   --text-secondary: #52514e;  --muted: #898781;
    --grid: #e1e0d9;           --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    /* categorical identity slots (light), assigned by entity, never recoloured */
    --c1:#2a78d6; --c2:#1baf7a; --c3:#eda100; --c4:#008300;
    --c5:#4a3aa7; --c6:#e34948; --c7:#e87ba4; --c8:#eb6834;
    --accent: var(--c1);
    --good:#006300;
    /* diverging pair (tornado swings): validated blue<->red, gray midpoint */
    --swing-hi:#2a78d6; --swing-lo:#e34948; --swing-mid:#f0efec;
    color-scheme: light;
  }
  .viz-root[data-theme="dark"] {
    --surface-1: #1a1a19;      --plane: #0d0d0d;
    --text-primary: #ffffff;   --text-secondary: #c3c2b7;  --muted: #898781;
    --grid: #2c2c2a;           --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#008300;
    --c5:#9085e9; --c6:#e66767; --c7:#d55181; --c8:#d95926;
    --good:#0ca30c;
    --swing-hi:#3987e5; --swing-lo:#e66767; --swing-mid:#383835;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  /* The `hidden` attribute must always win: class rules like `.empty{display:flex}`
     have higher priority than the UA `[hidden]{display:none}`, which would leave a
     hidden overlay (empty state / a hidden pane) painted. Author `!important`
     restores the intent of every `.hidden = true` toggle in the JS. */
  [hidden] { display: none !important; }
  html, body { margin: 0; height: 100%; }
  .viz-root {
    --navigator-width: 264px; --inspector-width: 268px;
    height: 100vh; display: flex; flex-direction: column;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--plane); color: var(--text-primary); font-size: 13px;
  }
  /* --- top bar --- */
  #topbar {
    display: flex; align-items: center; gap: 20px;
    padding: 0 16px; height: 48px; flex: none;
    background: var(--surface-1); border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .brand .mark { width: 12px; height: 12px; border-radius: 3px; background: var(--accent); }
  #title { letter-spacing: .01em; }
  #tabs { display: flex; gap: 2px; margin-left: 8px; }
  .tab {
    appearance: none; border: 0; background: transparent; cursor: pointer;
    font: inherit; color: var(--text-secondary); padding: 8px 14px; border-radius: 7px;
  }
  .tab:hover { background: var(--plane); color: var(--text-primary); }
  .tab[aria-selected="true"] { background: var(--plane); color: var(--text-primary); font-weight: 600; box-shadow: inset 0 -2px 0 var(--accent); }
  .topright { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 11px; color: var(--text-secondary); padding: 3px 8px; border: 1px solid var(--border); border-radius: 20px; }
  .ghost { appearance: none; background: transparent; border: 1px solid var(--border); color: var(--text-primary); border-radius: 7px; width: 30px; height: 30px; cursor: pointer; font-size: 14px; }
  .ghost:hover { background: var(--plane); }
  :where(button, input, select, [tabindex]):focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  .workspace-only { display: none; }
  .workspace-shell #navigator.workspace-only { display: block; }
  .workspace-shell .topright > .workspace-only { display: inline-flex; align-items: center; justify-content: center; }
  .workspace-shell .region-heading.workspace-only { display: flex; }
  .workspace-shell .panel-resizer.workspace-only { display: block; }
  .workspace-shell #topbar { gap: 12px; }
  .workspace-shell #tabs { min-width: 0; }
  .workspace-shell .brand { min-width: 150px; }
  .workspace-shell #title { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .icon-label { font-size: 11px; margin-left: 5px; }
  /* --- stage --- */
  #stage { flex: 1 1 auto; display: grid; grid-template-columns: 1fr 268px; min-height: 0; }
  .workspace-shell #stage { grid-template-columns: auto minmax(0, 1fr) auto; position: relative; }
  #view { position: relative; min-width: 0; background: var(--surface-1); }
  .pane { position: absolute; inset: 0; }
  .pane canvas, #volume-host, #scene3d-host { width: 100%; height: 100%; display: block; }
  #volume-host, #scene3d-host { position: absolute; inset: 0; }
  /* --- control panel --- */
  #navigator, #panel { position: relative; background: var(--surface-1); min-width: 0; }
  #navigator { width: var(--navigator-width); border-right: 1px solid var(--border); overflow: hidden; }
  #navigator-body { height: calc(100% - 39px); padding: 10px 10px 24px; overflow: hidden; }
  #panel { border-left: 1px solid var(--border); overflow-y: auto; }
  .workspace-shell #panel { width: var(--inspector-width); }
  .region-heading {
    position: sticky; z-index: 2; top: 0; height: 39px; display: flex; align-items: center; padding: 0 12px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border); color: var(--text-secondary);
    font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  }
  .panel-resizer {
    position: absolute; z-index: 10; top: 0; bottom: 0; width: 7px; cursor: col-resize;
    touch-action: none;
  }
  #navigator-resizer { right: -4px; }
  #inspector-resizer { left: -4px; }
  .panel-resizer:hover, .panel-resizer:focus-visible { background: color-mix(in srgb, var(--accent) 25%, transparent); }
  .panel-body { padding: 14px 14px 40px; }
  .group { margin-bottom: 16px; }
  .group > h2 {
    font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
    color: var(--muted); margin: 0 0 8px; font-weight: 600;
  }
  .row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .row label { color: var(--text-secondary); }
  .row.between { justify-content: space-between; }
  select, input[type="range"] { font: inherit; accent-color: var(--accent); }
  select {
    background: var(--plane); color: var(--text-primary); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 6px; max-width: 150px;
  }
  input[type="range"] { width: 130px; }
  .toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 3px 0; }
  .toggle input { accent-color: var(--accent); }
  .workspace-search {
    width: 100%; font: inherit; color: var(--text-primary); background: var(--plane);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; margin-bottom: 7px;
  }
  .workspace-project { height: 100%; }
  .workspace-tree { height: calc(100% - 40px); overflow: auto; border-block: 1px solid var(--border); padding: 4px 0; }
  .workspace-tree-virtual { position: relative; padding: 0; }
  .workspace-tree-spacer { width: 1px; opacity: 0; }
  .workspace-tree-window { position: absolute; inset: 0 0 auto 0; }
  .workspace-row {
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
    height: var(--row-h); min-height: var(--row-h);
    padding-left: calc(var(--tree-depth, 0) * 12px);
    background-image: repeating-linear-gradient(90deg, transparent 0 11px, color-mix(in srgb, var(--border) 72%, transparent) 11px 12px);
    background-size: calc(var(--tree-depth, 0) * 12px) 100%; background-repeat: no-repeat;
  }
  .workspace-group { padding-block: 0; }
  .workspace-object { padding-right: 3px; }
  .workspace-object:hover, .workspace-object:focus-within { background-color: color-mix(in srgb, var(--accent) 7%, transparent); }
  .workspace-selected { background-color: color-mix(in srgb, var(--accent) 12%, transparent); }
  .workspace-loading { opacity: .78; }
  .workspace-error { box-shadow: inset 2px 0 var(--swing-lo); }
  .workspace-unavailable { opacity: .62; }
  .workspace-row > span:not(.workspace-count) { overflow: hidden; text-overflow: ellipsis; }
  .workspace-group { font-weight: 600; }
  .workspace-twist { appearance: none; border: 0; background: transparent; color: var(--muted); width: 18px; padding: 0; cursor: pointer; }
  .workspace-count, .workspace-status { margin-left: auto; color: var(--muted); font-size: 10px; }
  .workspace-lane-select { margin-left: auto; max-width: 96px; min-width: 0; padding: 2px 4px; font-size: 10px; }
  .workspace-lane-select + .workspace-status { margin-left: 0; }
  .workspace-role { color: var(--accent); font-size: 8px; font-weight: 700; letter-spacing: .04em; flex: none; min-width: 22px; }
  .workspace-disabled { color: var(--muted); }
  .workspace-retry { appearance: none; border: 0; background: transparent; color: var(--swing-lo); font: inherit; font-size: 10px; cursor: pointer; margin-left: auto; }
  .workspace-region-state { color: var(--muted); font-size: 11px; line-height: 1.45; padding: 10px 4px; }
  .swatch { width: 11px; height: 11px; border-radius: 3px; flex: none; }
  .swatch.line { height: 0; border-top: 2px solid; border-radius: 0; width: 14px; }
  .btn {
    appearance: none; font: inherit; cursor: pointer; width: 100%;
    background: var(--accent); color: #fff; border: 0; border-radius: 7px; padding: 8px;
  }
  .btn.secondary { background: var(--plane); color: var(--text-primary); border: 1px solid var(--border); }
  .btn[disabled] { opacity: .45; cursor: not-allowed; }
  .hint { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 6px; }
  /* --- overlays --- */
  .readout {
    position: absolute; pointer-events: none; z-index: 5;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 7px;
    padding: 7px 9px; font-size: 12px; box-shadow: 0 3px 12px rgba(0,0,0,.18);
    max-width: 240px;
  }
  .readout .val { font-weight: 600; font-size: 14px; }
  .readout .lbl { color: var(--text-secondary); }
  .readout .key { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align: middle; }
  .legend {
    position: absolute; left: 14px; bottom: 14px; z-index: 4;
    background: color-mix(in srgb, var(--surface-1) 88%, transparent);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    max-width: 260px; backdrop-filter: blur(3px);
  }
  .legend h3 { margin: 0 0 6px; font-size: 11px; color: var(--text-secondary); font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .legend h3 + .ramp, .legend .scale + h3 { margin-top: 6px; }
  .legend .type-icon { flex: none; border-radius: 2px; }
  .legend .ramp { height: 10px; border-radius: 3px; margin: 4px 0; }
  .legend .scale { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .legend .keys { margin-top: 6px; display: grid; gap: 3px; }
  .legend .keys .k { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); }
  .empty {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--muted); padding: 40px; font-size: 13px; line-height: 1.6;
  }
  .button-tooltip {
    position: fixed; z-index: 40; max-width: min(280px, calc(100vw - 16px));
    padding: 5px 8px; border-radius: 5px; pointer-events: none;
    background: var(--text-primary); color: var(--surface-1); border: 1px solid var(--border);
    box-shadow: 0 4px 14px rgba(0,0,0,.22); font-size: 11px; line-height: 1.35;
  }
  /* a LOUD failure surface — the ledger's silent-death mode is the enemy: a
     too-large mesh, an oversize inline payload, or a decode/parse error never
     leaves a blank page; it says so here with the suggested remedy. */
  .banner {
    position: absolute; left: 50%; top: 20px; transform: translateX(-50%); z-index: 8;
    max-width: min(680px, 90%); background: var(--surface-1);
    border: 1px solid var(--swing-lo); border-left: 4px solid var(--swing-lo);
    border-radius: 8px; padding: 12px 16px; box-shadow: 0 6px 24px rgba(0,0,0,.22);
    font-size: 12.5px; line-height: 1.55; color: var(--text-primary);
  }
  .banner b { color: var(--swing-lo); }
  .banner .hint { margin-top: 4px; }
  #statusbar {
    height: 28px; flex: none; align-items: center; gap: 14px; padding: 0 12px;
    background: var(--surface-1); border-top: 1px solid var(--border);
    color: var(--text-secondary); font-size: 11px;
  }
  .workspace-shell #statusbar { display: flex; }
  #statusbar .status-primary { color: var(--text-primary); font-weight: 600; }
  #statusbar .status-detail { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #shortcut-help {
    position: fixed; z-index: 20; inset: 0; background: rgba(0,0,0,.32);
    align-items: center; justify-content: center; padding: 20px;
  }
  #shortcut-help:not([hidden]) { display: flex; }
  .shortcut-card {
    position: relative;
    width: min(420px, 100%); background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px; box-shadow: 0 12px 40px rgba(0,0,0,.25);
  }
  .shortcut-card h2 { margin: 0 0 12px; font-size: 16px; }
  #shortcut-close { position: absolute; right: 12px; top: 12px; }
  .shortcut-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 14px; }
  kbd { border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 4px; padding: 1px 6px; font: inherit; text-align: center; }
  @media (max-width: 1100px) {
    .workspace-shell #navigator { width: min(var(--navigator-width), 230px); }
    .workspace-shell #panel { width: min(var(--inspector-width), 240px); }
    .workspace-shell #title { max-width: 190px; }
    .workspace-shell .tab { padding-inline: 9px; }
    .workspace-shell .icon-label { display: none; }
  }
  @media (max-width: 780px) {
    .workspace-shell #topbar { padding-inline: 8px; }
    .workspace-shell .brand { min-width: 0; }
    .workspace-shell #title { max-width: 140px; }
    .workspace-shell #stage { grid-template-columns: minmax(0, 1fr); }
    .workspace-shell #navigator, .workspace-shell #panel {
      position: absolute; z-index: 12; top: 0; bottom: 0; max-width: calc(100% - 48px);
      box-shadow: 0 8px 28px rgba(0,0,0,.18);
    }
    .workspace-shell #navigator { left: 0; }
    .workspace-shell #panel { right: 0; }
    .workspace-shell #view { grid-column: 1; }
    .workspace-shell #tabs { overflow-x: auto; }
    .workspace-shell .tab { padding-inline: 7px; white-space: nowrap; }
  }
</style>
</head>
<body>
<div id="app" class="viz-root" data-theme="light">
  <header id="topbar">
    <div class="brand"><span class="mark"></span><span id="title">model viewer</span></div>
    <nav id="tabs" role="tablist">
      <button class="tab" data-tab="map" role="tab" aria-selected="true">Map</button>
      <button class="tab" data-tab="section" role="tab" aria-selected="false">Intersection</button>
      <button class="tab" data-tab="volume" role="tab" aria-selected="false">Volume</button>
      <button class="tab" data-tab="scene3d" role="tab" aria-selected="false" hidden>3D</button>
      <button class="tab" data-tab="wells" role="tab" aria-selected="false">Wells</button>
      <button class="tab" data-tab="charts" role="tab" aria-selected="false">Charts</button>
    </nav>
    <div class="topright">
      <span id="mode-badge" class="badge" title="capability mode">starting</span>
      <button id="navigator-toggle" class="ghost workspace-only" type="button" aria-label="Toggle Project navigator" aria-controls="navigator" aria-expanded="true" title="Toggle Project navigator">☰</button>
      <button id="inspector-toggle" class="ghost workspace-only" type="button" aria-label="Toggle Inspector" aria-controls="panel" aria-expanded="true" title="Toggle Inspector">◧</button>
      <button id="help-toggle" class="ghost workspace-only" type="button" aria-label="Keyboard shortcuts" aria-haspopup="dialog" aria-controls="shortcut-help" title="Keyboard shortcuts (?)">?</button>
      <button id="theme-toggle" class="ghost" type="button" aria-label="Toggle light or dark theme" title="Toggle light / dark">☾</button>
    </div>
  </header>
  <main id="stage">
    <aside id="navigator" class="workspace-only" aria-labelledby="navigator-heading" hidden>
      <div id="navigator-heading" class="region-heading">Project</div>
      <div id="navigator-body"></div>
      <div id="navigator-resizer" class="panel-resizer" role="separator" tabindex="0" aria-label="Resize Project navigator" aria-orientation="vertical"></div>
    </aside>
    <section id="view" aria-label="Active workspace view">
      <div class="pane" data-pane="map" role="tabpanel"><canvas id="map-canvas"></canvas></div>
      <div class="pane" data-pane="section" role="tabpanel" hidden><canvas id="section-canvas"></canvas></div>
      <div class="pane" data-pane="volume" role="tabpanel" hidden><div id="volume-host"></div></div>
      <div class="pane" data-pane="scene3d" role="tabpanel" hidden><div id="scene3d-host"></div></div>
      <div class="pane" data-pane="wells" role="tabpanel" hidden><canvas id="wells-canvas"></canvas></div>
      <div class="pane" data-pane="charts" role="tabpanel" hidden><canvas id="charts-canvas"></canvas></div>
      <div id="readout" class="readout" hidden></div>
      <div id="legend" class="legend"></div>
      <div id="banner" class="banner" hidden></div>
      <div id="empty" class="empty" hidden></div>
    </section>
    <aside id="panel" aria-labelledby="inspector-heading">
      <div id="inspector-heading" class="region-heading workspace-only">Inspector</div>
      <div class="panel-body" id="panel-body"></div>
      <div id="inspector-resizer" class="panel-resizer workspace-only" role="separator" tabindex="0" aria-label="Resize Inspector" aria-orientation="vertical"></div>
    </aside>
  </main>
  <footer id="statusbar" class="workspace-only" role="status" aria-live="polite">
    <span id="status-view" class="status-primary">Starting</span>
    <span id="status-detail" class="status-detail">Preparing workspace…</span>
  </footer>
  <div id="shortcut-help" role="dialog" aria-modal="true" aria-labelledby="shortcut-title" hidden>
    <div class="shortcut-card" tabindex="-1">
      <h2 id="shortcut-title">Keyboard shortcuts</h2>
      <button id="shortcut-close" class="ghost" type="button" aria-label="Close keyboard shortcuts">×</button>
      <div class="shortcut-grid">
        <kbd>/</kbd><span>Search the Project navigator</span>
        <kbd>1–3</kbd><span>Switch among available views</span>
        <kbd>F</kbd><span>Fit the active view</span>
        <kbd>?</kbd><span>Open or close this reference</span>
        <kbd>Esc</kbd><span>Close this reference</span>
      </div>
    </div>
  </div>
  <div id="button-tooltip" class="button-tooltip" role="tooltip" hidden></div>
  <script src="./decode.js"></script>
  <script src="./three.global.js"></script>
  <script src="./orbitcontrols.global.js"></script>
  <script src="./viewer.js"></script>
</div>
</body>
</html>
